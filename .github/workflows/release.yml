name: Release

on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'

env:
  NPM_DIR: npm

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-zig: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout codes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07 # v1.0.0
        with:
          node-version: 22
          cache: true

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Setup Zig
        if: matrix.use-zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        with:
          version: 0.13.0

      - name: Install dependencies
        run: vp install

      - name: Build native binding
        run: >
          npx napi build
          --release
          --platform
          --package makefile-binding
          --target ${{ matrix.target }}
          --dts index.d.ts
          --js index.js
          --esm
          -o binding
          ${{ matrix.use-cross && '--use-napi-cross' || '' }}
          ${{ matrix.use-zig && '-x' || '' }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          if-no-files-found: error
          name: bindings-${{ matrix.target }}
          path: binding/*.node

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout codes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07 # v1.0.0
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Move artifacts to binding directory
        run: |
          mkdir -p binding
          find artifacts -name '*.node' -exec cp {} binding/ \;
          ls -la binding/
        shell: bash

      - name: Build TypeScript
        run: vp pack

      - name: Create npm directories
        run: npx napi create-npm-dirs --npm-dir ${NPM_DIR}

      - name: Prepare platform packages
        run: npx napi artifacts --build-output-dir binding --npm-dir ${NPM_DIR}

      - name: List platform packages
        run: |
          for dir in ${NPM_DIR}/*/; do
            echo "=== $(basename $dir) ==="
            ls -la "$dir"
          done
        shell: bash

      - name: Setup npm for publishing
        run: |
          npm config set provenance true
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages
        run: npx napi pre-publish --no-gh-release -t npm --npm-dir ${NPM_DIR}

      - name: Publish main package
        run: |
          # Restore any changes made by napi pre-publish to lockfile
          git restore --source=HEAD --staged --worktree -- pnpm-lock.yaml 2>/dev/null || true
          pnpm publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Extract version tag
        if: startsWith( github.ref, 'refs/tags/v' )
        uses: jungwinter/split@7f51d99e7cc1f147f6f99be75acf5e641930af88 # v2.1.0
        id: split
        with:
          msg: ${{ github.ref }}
          separator: /

      - name: Create Github Release
        run: gh release create ${{ steps.split.outputs._2 }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog from github releases
        run: pnpx gh-changelogen --repo=kazupon/vite-plugin-makefile --tag=${{ steps.split.outputs._2 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
